  # ==========================================================

  # --- Nhóm Tấn Công (Góc Trái - Hàng 1) ---
  warrior_might:
    display-name: '&#FF5555&lWarrior''s Might &8[Lv.%current_level%/%max_level%]'
    material: IRON_SWORD
    weight: 50
    slot: 1
    type: DAMAGE_MULTIPLIER
    max-level: 5
    base-value: 1.1
    increment: 0.05
    lore:
      - '&7&m---------------------'
      - '&fInfuse your attacks with raw force.'
      - '&fIncreases all outgoing physical damage.'
      - '&fCurrent Bonus: &c+&e%current_value%%'
      - '&fNext Level: &c+&e%next_value%%'
      - '&f&o(Resets when match ends)'
      - '&7&m---------------------'

  critical_strike:
    display-name: '&#FFAA00&lCritical Strike &8[Lv.%current_level%/%max_level%]'
