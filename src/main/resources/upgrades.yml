# ==========================================================
# MOB ARENA V2 - ROGUELIKE UPGRADE SYSTEM
# ----------------------------------------------------------
# Placeholder Guide:
# %current_level% : Player's current level
# %max_level%     : Maximum level
# %current_value% : Current value (base + increment * level)
# %next_value%    : Value at the next level
# ==========================================================

settings:
  enabled: true
  trigger-every: 5
  default-max-slots: 3
  class-slots:
    Knight: 3
    Archer: 3
    Alchemist: 4
    Juggernaut: 2

